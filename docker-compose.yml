version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: sustentabilizar-db
    environment:
      POSTGRES_USER: sustentabilizar
      POSTGRES_PASSWORD: sustentabilizar_password
      POSTGRES_DB: sustentabilizar
    ports:
      - "5433:5432"   # 5432 já ocupado pelo PostgreSQL do host; acesse via localhost:5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sustentabilizar"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sustentabilizar-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sustentabilizar-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - ./frontend/.env
    depends_on:
      - backend

volumes:
  postgres_data:
